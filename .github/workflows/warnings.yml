name: Warnings

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  warnings-as-errors:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

    - name: Build with -Werror
      run: make clean && make all CFLAGS="-Wall -Wextra -Werror -std=c99 -D_GNU_SOURCE -Iinclude -DUSE_SQLITE"

    - name: Run tests
      run: make test CFLAGS="-Wall -Wextra -Werror -std=c99 -D_GNU_SOURCE -Iinclude -DUSE_SQLITE"
