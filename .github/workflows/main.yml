name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]

    runs-on: ${{ matrix.os }}

    env:
      CC: ${{ matrix.compiler }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        # Ensure the command-line tools are available; sqlite3 ships with macOS.
        xcode-select --install || true

    - name: Build project
      run: make clean && make all

    - name: Run tests
      run: make test
